<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Αριθμομηχανή</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Αριθμομηχανή</h1>
    <p id="display"></p>


    <hr>
    <div id="buttons">
         <div id="controls_1">
                <button value="7">7</button>
                <button value="8">8</button>
                <button value="9">9</button>
        </div>
    
        <div id="controls_2">
             <button value="4">4</button>
             <button value="5">5</button>
            <button value="6">6</button>
        </div>
    
        <div id="controls_3">
            <button value="1">1</button>
            <button value="2">2</button>
            <button value="3">3</button>
        </div>
         <button id="button0" value="0">0</button>
    </div>
    
    <div id="controls_4">
         
         <select  id="praxh">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>
         <button id="ison">=</button>

    </div>
    

    <!-- <p>Το αποτέλεσμα της πράξης είναι: <span id="res"><b></b></span></p> -->
    

  
        





    <script src="script.js"></script>
</body>
</html>
